<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Master - Godot Mockup</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .game-area {
            width: 300px;
            height: 300px;
            background-color: #1e293b;
            border: 4px solid #334155;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .game-area:active {
            transform: scale(0.95);
        }
        .score {
            margin-top: 20px;
            font-size: 18px;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #38bdf8;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Logic Master</h1>
    <div class="game-area" id="gameArea">SOLVE PUZZLE</div>
    <div class="score">Current Score: <span id="scoreVal">0</span></div>
    <button class="btn" id="sendScore">SEND SCORE TO PORTAL</button>

    <script>
        let score = 0;
        const scoreVal = document.getElementById('scoreVal');
        const gameArea = document.getElementById('gameArea');
        const sendScoreBtn = document.getElementById('sendScore');

        gameArea.addEventListener('click', () => {
            score += 25;
            scoreVal.innerText = score;
        });

        sendScoreBtn.addEventListener('click', () => {
            // Send score to parent window (the portal)
            window.parent.postMessage({
                type: 'SEND_SCORE',
                score: score
            }, '*');
        });
    </script>
</body>
</html>
